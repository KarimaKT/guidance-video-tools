# Example: AI Webinar Project
# ============================
# Copy this file to your project folder and fill in the values.
#
# Run:  python sanitize.py this_file.yaml
# Audit only:  python sanitize.py this_file.yaml --audit

template: ai_webinar

# ── Source files ──────────────────────────────────────────────
video: "path/to/recording.mp4"
vtt: "path/to/transcript.vtt"
output: "path/to/output.mp4"

# ── Speakers to keep ─────────────────────────────────────────
# Exact names as they appear in the VTT transcript.
# Tip: run with --audit first to see all speaker names detected.
keep_speakers:
  - "Presenter Name 1"
  - "Presenter Name 2"

# ── Segments to keep (in seconds) ────────────────────────────
# Omit this section to process the entire video.
# The editor will auto-split these around disturbances.
segments:
  - start: 369
    end: 4017
    note: "Main presentation content"
  - start: 4271
    end: 4291
    note: "Closing remarks"

# ── Layout overrides (optional) ──────────────────────────────
# Use when the video switches layout mid-recording
# (e.g., gallery view for a closing segment).
# Segment index refers to the segments list above (0-based).
#
# layout_overrides:
#   - segment: 1
#     masks:
#       - { x: 1690, y: 0, w: 230, h: 1080, label: "attendee circles" }
#       - { x: 0, y: 1050, w: 220, h: 30, label: "name bar left" }
#       - { x: 790, y: 1048, w: 220, h: 30, label: "name bar right" }

# ── Quality settings (optional — template defaults apply) ────
# settings:
#   crf: 22            # 18=lossless, 22=high, 28=draft
#   audio_enhance: true
