# Demo Video: Meeting Sanitizer Feature Overview
# ================================================
# ~60 second explainer of the Meeting Sanitizer tool
# Run: python creator/video_creator.py examples/sanitizer_demo.yaml examples/sanitizer_demo.mp4

title: "Meeting Sanitizer — Publish-Ready Meeting Videos"
resolution: "1920x1080"
fps: 30
voice: "en-US-AriaNeural"
voice_rate: "+10%"

scenes:
  - title: "Meeting Sanitizer"
    subtitle: "From messy meeting to publish-ready video"
    visual: slide
    background: "#0f0f23"
    accent_color: "#4fc3f7"
    narration: >
      Meeting Sanitizer transforms a Teams or Zoom recording into a polished,
      publish-ready video with a reviewable edit plan.

  - title: "What you provide"
    icon: "📦"
    bullets:
      - "A recording"
      - "A transcript"
      - "Presenter names to keep"
      - "Optional manual keep ranges"
    visual: slide
    background: "#1a1a2e"
    accent_color: "#81c784"
    narration: >
      Start with the recording, the transcript, and the presenter names to keep.
      Add manual keep ranges when you want editorial control over the final cut.

  - title: "What the app decides"
    icon: "🛡"
    bullets:
      - "Cut non-target speech"
      - "Flag admin chatter"
      - "Mask non-presenting participants"
      - "Preserve presenter names"
    visual: slide
    background: "#1a1a2e"
    accent_color: "#f06292"
    narration: >
      The sanitizer analyzes the transcript, identifies disturbances, masks
      non-presenting participants, and keeps presenter names when they should
      remain visible.

  - title: "Quality bar"
    subtitle: "Complete thoughts. Clean cuts. Valid media."
    bullets:
      - "Review every proposed cut"
      - "Keep complete closing phrases"
      - "Avoid accidental mid-sentence trims"
      - "Validate output before publishing"
    visual: slide
    background: "#1a1a2e"
    accent_color: "#ba68c8"
    narration: >
      The quality bar is not just removing interruptions. It is preserving
      complete thoughts, avoiding mid-sentence trims, and validating the final
      media before publishing.

  - title: "Publish with confidence"
    subtitle: "Reviewable decisions. Validated output."
    visual: slide
    background: "#0f0f23"
    accent_color: "#81c784"
    narration: >
      Reviewable decisions and validated output help you publish with
      confidence. That's Meeting Sanitizer.
