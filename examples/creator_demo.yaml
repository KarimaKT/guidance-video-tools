# Demo Video: Video Creator Feature Overview
# =============================================
# ~60 second explainer of the Video Creator tool
# Run: python creator/video_creator.py examples/creator_demo.yaml examples/creator_demo.mp4

title: "Video Creator — Narrated Explainers"
resolution: "1920x1080"
fps: 30
voice: "en-US-AndrewNeural"
voice_rate: "+8%"

scenes:
  - title: "Video Creator"
    subtitle: "Narrated explainers from structured scenes"
    visual: slide
    background: "#0f0f23"
    accent_color: "#ba68c8"
    narration: >
      Video Creator turns structured scenes into a narrated explainer with
      polished slides, motion, and validated media output.

  - title: "What you provide"
    icon: "💡"
    bullets:
      - "Scene titles"
      - "Narration"
      - "Bullets and accent colors"
      - "Voice and pacing"
    visual: slide
    background: "#1a1a2e"
    accent_color: "#4fc3f7"
    narration: >
      Provide scene titles, narration, bullets, colors, and voice preferences.
      The app turns those choices into a repeatable video script.

  - title: "What gets generated"
    icon: "🎬"
    bullets:
      - "Gradient slide visuals"
      - "Neural voiceover"
      - "Animated scene transitions"
      - "Validated audio and video"
    visual: slide
    background: "#1a1a2e"
    accent_color: "#81c784"
    narration: >
      The creator generates professional slide visuals, narrates them with
      neural text-to-speech, adds motion, and validates the final MP4.

  - title: "Review in the Test Gallery"
    bullets:
      - "Keep only useful demo assets"
      - "Compare current outputs to references"
      - "Avoid clutter from intermediate renders"
    visual: slide
    background: "#0f0f23"
    accent_color: "#ffb74d"
    narration: >
      The Test Gallery keeps review simple. It shows curated demo outputs and
      reference clips without copying every source or intermediate file.

  - title: "Create repeatable explainers"
    subtitle: "Structured script. Polished output."
    visual: slide
    background: "#0f0f23"
    accent_color: "#ba68c8"
    narration: >
      Structured scripts make your explainers repeatable, editable, and easy to
      improve. That's Video Creator.
